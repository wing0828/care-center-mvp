<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>요양센터 위험관리 MVP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#1f2328;--muted:#6b7280;--line:#e3e6ea;--line2:#eef1f4;--bg:#eceef1;
    --paper:#fff;--brand:#2563eb;--brand-d:#1d4ed8;--soft:#f6f8fa;--soft2:#f0f4ff;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:-apple-system,"Segoe UI","Malgun Gothic",sans-serif;color:var(--ink);}
  .app{display:flex;min-height:100vh;}
  .rail{width:212px;flex:none;background:#fff;border-right:1px solid var(--line);padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto;}
  .rail h1{font-size:13px;margin:0 0 2px;}
  .rail .sub{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
  .navsec{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 6px;}
  .navitem{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;font-size:12.5px;cursor:pointer;color:#374151;}
  .navitem:hover{background:var(--soft);}
  .navitem.active{background:var(--soft2);color:var(--brand-d);font-weight:600;}
  .navitem .n{font-size:10px;width:18px;height:18px;border-radius:5px;background:#e5e7eb;color:#4b5563;display:flex;align-items:center;justify-content:center;flex:none;font-weight:700;}
  .navitem.active .n{background:var(--brand);color:#fff;}
  .me{margin-top:18px;border-top:1px solid var(--line);padding-top:12px;font-size:11.5px;color:var(--muted);}
  .me b{color:var(--ink);}
  .logout{margin-top:8px;font-size:11.5px;color:var(--brand);cursor:pointer;}

  .stage{flex:1;display:flex;flex-direction:column;align-items:center;padding:24px 20px 70px;}
  .wrap{width:100%;max-width:880px;}
  .pagehd{display:flex;align-items:center;gap:10px;margin:2px 0 16px;}
  .pagehd .num{font-size:11px;font-weight:700;background:var(--brand);color:#fff;border-radius:6px;padding:3px 8px;}
  .pagehd h2{font-size:18px;margin:0;}
  .pagehd .who{margin-left:auto;font-size:11.5px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:20px;padding:4px 11px;}
  .back{font-size:12.5px;color:var(--brand);cursor:pointer;margin-bottom:8px;display:inline-block;}

  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
  .card h3{font-size:13px;margin:0 0 10px;color:#374151;}
  .label{font-size:11.5px;color:var(--muted);margin:11px 0 5px;}
  input,select,textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:13px;font-family:inherit;color:#222;background:#fff;}
  textarea{min-height:64px;resize:vertical;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .row>*{flex:1;min-width:120px;}
  .btn{background:var(--brand);color:#fff;border:0;border-radius:10px;padding:11px 14px;font-size:13.5px;font-weight:600;cursor:pointer;}
  .btn:hover{background:var(--brand-d);}
  .btn.ghost{background:#fff;color:#374151;border:1px solid var(--line);}
  .btn.sm{padding:8px 11px;font-size:12px;}
  .btn.block{width:100%;}
  .btnrow{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:6px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{font-size:12.5px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;cursor:pointer;user-select:none;}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand);}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
  @media(max-width:680px){.grid4{grid-template-columns:1fr 1fr;}.grid3{grid-template-columns:1fr 1fr;}}
  .stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 14px;cursor:pointer;transition:.12s;}
  .stat:hover{border-color:#c7d2fe;background:var(--soft2);}
  .stat .k{font-size:11.5px;color:var(--muted);}
  .stat .v{font-size:26px;font-weight:700;margin-top:4px;line-height:1;}
  .stat .v small{font-size:13px;font-weight:500;color:var(--muted);}
  .li{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line2);font-size:13px;cursor:pointer;}
  .li:last-child{border-bottom:0;}
  .li:hover{background:var(--soft2);}
  .av{width:26px;height:26px;border-radius:50%;background:#e5e7eb;flex:none;}
  .ln{flex:1;}.ln b{font-weight:600;}.ln span{display:block;color:var(--muted);font-size:11.5px;margin-top:1px;}
  .pill{font-size:11px;border-radius:20px;padding:3px 10px;font-weight:600;white-space:nowrap;}
  .s-정상,.s-연결완료,.s-확인완료,.s-조치완료{background:#dcfce7;color:#15803d;}
  .s-주의,.s-관심,.s-전달함,.s-후보확인,.s-조치중{background:#fef3c7;color:#b45309;}
  .s-위험,.s-불발,.s-미안내{background:#fee2e2;color:#b91c1c;}
  .s-요청됨,.s-신규{background:#eef2ff;color:#4338ca;}
  .sev-높음,.sev-긴급{background:#fee2e2;color:#b91c1c;}
  .sev-보통{background:#fef3c7;color:#b45309;}
  .sev-낮음{background:#f1f5f9;color:#475569;}
  .kv{display:flex;font-size:13px;border-bottom:1px solid var(--line2);}
  .kv:last-child{border-bottom:0;}
  .kk{width:120px;flex:none;background:var(--soft);color:var(--muted);padding:9px 11px;font-size:12px;}
  .vv{padding:9px 11px;flex:1;}
  .hint{font-size:11.5px;color:#9aa3af;margin-top:6px;}
  .empty{text-align:center;color:#9aa3af;font-size:12.5px;padding:18px;}
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center;width:100%;}
  .loginbox{width:340px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:26px 24px;box-shadow:0 12px 36px rgba(20,30,50,.1);}
  .brandmark{width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,#2563eb,#1d4ed8);margin:6px auto 12px;}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#111827;color:#fff;font-size:13px;padding:11px 20px;border-radius:24px;opacity:0;transition:.25s;pointer-events:none;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.err{background:#b91c1c;}
  .badge{font-size:9px;margin-left:auto;color:var(--muted);border:1px solid var(--line);border-radius:10px;padding:0 6px;}
  .loading{position:fixed;inset:0;background:rgba(255,255,255,.6);display:none;align-items:center;justify-content:center;z-index:55;font-size:13px;color:var(--muted);}
  .loading.on{display:flex;}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<div class="loading" id="loading">불러오는 중…</div>

<script>
const SUPABASE_URL='https://zikflgaroszijqflchjf.supabase.co';
const SUPABASE_KEY='sb_publishable_9gS7Kb1qY8ClZMpOoLmB2Q_TvaDQDjS';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const PROBLEMS=['폭언','성희롱','업무외요구','보호자 과도','신체 부담','이동 부담','당일 취소','기타'];
const SEVERITIES=['낮음','보통','높음','긴급'];
const ACTIONTYPES=['보호자 상담','업무범위 재안내','보호사 상담','배정 변경 검토','대체근무 제안','서비스 조정'];
const NAV=[
  {sec:'1차 MVP',items:[['dash','2','대시보드'],['incident','3','사건 기록'],['risk','4','위험가구'],['action','5','조치 기록'],['report','8','월간 리포트']]},
  {sec:'2차 MVP',items:[['sub','6','대체근무'],['scope','7','업무범위'],['worker','9','요양보호사']]},
  {sec:'관리',items:[['mworker','+','요양보호사 관리'],['mrecipient','+','수급자 관리']]},
];

let S={user:null,route:'dash',params:{},hist:[]};
const $=id=>document.getElementById(id);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fdate=d=>d?String(d).slice(0,10):'-';
function toast(m,err){const e=$('toast');e.textContent=m;e.className='toast show'+(err?' err':'');clearTimeout(window._t);window._t=setTimeout(()=>e.className='toast',1800);}
function load(on){$('loading').className='loading'+(on?' on':'');}
function go(route,params,push=true){if(push)S.hist.push({route:S.route,params:S.params});S.route=route;S.params=params||{};render();}
function back(){const p=S.hist.pop();if(p){S.route=p.route;S.params=p.params;render();}else{go('dash',{},false);}}

/* ---------- DATA ---------- */
async function q(table,opts={}){let b=db.from(table).select(opts.select||'*');if(opts.eq)for(const[k,v]of Object.entries(opts.eq))b=b.eq(k,v);if(opts.order)b=b.order(opts.order,{ascending:opts.asc!==false});const{data,error}=await b;if(error){toast('읽기 오류: '+error.message,true);return[];}return data||[];}

/* ---------- LOGIN ---------- */
function renderLogin(){
  $('root').innerHTML=`<div class="login"><div class="loginbox">
    <div style="text-align:center"><div class="brandmark"></div>
      <div style="font-size:15px;font-weight:700">요양센터 위험관리 시스템</div>
      <div class="hint">센터장 · 사회복지사 전용 (파일럿)</div></div>
    <div class="label">아이디</div><input id="u" value="social" autocomplete="off">
    <div class="label">비밀번호</div><input id="p" type="password" value="1234">
    <div style="height:16px"></div>
    <button class="btn block" onclick="doLogin()">로그인</button>
    <div class="hint" style="text-align:center;margin-top:12px">데모 계정 — 사회복지사 social/1234 · 센터장 center/1234</div>
  </div></div>`;
  $('p').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
}
async function doLogin(){
  const u=$('u').value.trim(),p=$('p').value;
  load(true);
  const{data,error}=await db.from('care_staff').select('*').eq('username',u).eq('password',p).maybeSingle();
  load(false);
  if(error){toast('로그인 오류: '+error.message,true);return;}
  if(!data){toast('아이디/비밀번호를 확인하세요',true);return;}
  S.user=data;S.route='dash';S.hist=[];render();
}
function logout(){S.user=null;S.hist=[];renderLogin();}

/* ---------- SHELL ---------- */
function shell(inner){
  const roleName=S.user.role==='center_head'?'센터장':'사회복지사';
  let nav='';
  NAV.forEach(g=>{nav+=`<div class="navsec">${g.sec}</div>`;
    g.items.forEach(([r,n,t])=>{nav+=`<div class="navitem ${S.route===r?'active':''}" onclick="go('${r}',{})"><span class="n">${n}</span>${t}</div>`;});});
  return `<div class="app">
    <aside class="rail">
      <h1>요양센터 관리 MVP</h1><div class="sub">검증 5문제 · 파일럿</div>
      ${nav}
      <div class="me">접속: <b>${esc(S.user.name)}</b><br>${roleName}<div class="logout" onclick="logout()">로그아웃</div></div>
    </aside>
    <main class="stage"><div class="wrap">${inner}</div></main>
  </div>`;
}
function hd(num,title){const roleName=S.user.role==='center_head'?'센터장':'사회복지사';
  const b=S.hist.length?`<span class="back" onclick="back()">← 뒤로</span>`:'';
  return `${b}<div class="pagehd"><span class="num">${num}</span><h2>${title}</h2><span class="who">${esc(S.user.name)} · ${roleName}</span></div>`;}

/* ---------- 2 DASHBOARD ---------- */
async function viewDash(){
  const[recip,inc,subs,workers]=await Promise.all([
    q('care_recipients',{order:'created_at'}),
    q('care_incidents',{order:'occurred_on',asc:false}),
    q('care_substitutes',{order:'created_at',asc:false}),
    q('care_careworkers',{order:'created_at'}),
  ]);
  const wmap=Object.fromEntries(workers.map(w=>[w.id,w.name]));
  const rmap=Object.fromEntries(recip.map(r=>[r.id,r.name]));
  const risky=recip.filter(r=>['주의','위험','조치중'].includes(r.risk_status));
  const unresolved=inc.filter(i=>!i.resolved);
  const todayCancel=inc.filter(i=>i.problem_type==='당일 취소');
  const needSub=subs.filter(s=>['요청됨','후보확인'].includes(s.status));
  const atRisk=workers.filter(w=>['주의','위험'].includes(w.attrition_status));
  const liR=r=>`<div class="li" onclick="go('riskcard',{id:'${r.id}'})"><div class="av"></div><div class="ln"><b>${esc(r.name)} 수급자</b><span>담당 ${esc(wmap[r.careworker_id]||'-')}</span></div><span class="pill s-${r.risk_status}">${r.risk_status}</span></div>`;
  const liI=i=>`<div class="li" onclick="go('riskcard',{id:'${i.recipient_id||''}'})"><div class="ln"><b>${esc(wmap[i.careworker_id]||'-')} · ${esc(i.problem_type)}</b><span>${esc(rmap[i.recipient_id]||'대상 미지정')} · ${fdate(i.occurred_on)}</span></div><span class="pill sev-${i.severity}">${i.severity}</span></div>`;
  return shell(hd('2','대시보드')+`
    <div class="grid4">
      <div class="stat" onclick="go('risk',{})"><div class="k">오늘 위험가구</div><div class="v">${risky.length}</div></div>
      <div class="stat" onclick="go('worker',{})"><div class="k">미처리 고충</div><div class="v">${unresolved.length}</div></div>
      <div class="stat" onclick="go('sub',{})"><div class="k">당일 취소</div><div class="v">${todayCancel.length}</div></div>
      <div class="stat" onclick="go('sub',{})"><div class="k">대체근무 필요</div><div class="v">${needSub.length}</div></div>
    </div>
    <div class="card" style="margin-top:14px"><div class="stat" style="cursor:default" onclick="go('worker',{})"><div class="k">이탈위험 요양보호사</div><div class="v">${atRisk.length} <small>명</small></div></div></div>
    <div class="card"><h3>위험가구 (주의·위험·조치중)</h3>${risky.length?risky.map(liR).join(''):'<div class="empty">해당 가구 없음</div>'}</div>
    <div class="card"><h3>최근 접수 고충</h3>${unresolved.length?unresolved.slice(0,6).map(liI).join(''):'<div class="empty">미처리 고충 없음</div>'}</div>
    <div class="btnrow">
      <button class="btn" onclick="go('incident',{})">+ 사건 기록</button>
      <button class="btn ghost" onclick="go('report',{})">월간 리포트 보기</button>
    </div>`);
}

/* ---------- 3 INCIDENT ---------- */
async function viewIncident(){
  const[workers,recip]=await Promise.all([q('care_careworkers',{order:'name'}),q('care_recipients',{order:'name'})]);
  const opt=(arr,sel)=>arr.map(x=>`<option value="${x.id}" ${sel===x.id?'selected':''}>${esc(x.name)}</option>`).join('');
  const preR=S.params.recipientId||'';
  return shell(hd('3','사건 기록')+`
    <div class="card">
      <div class="row">
        <div><div class="label">요양보호사</div><select id="i_w">${opt(workers)}</select></div>
        <div><div class="label">수급자</div><select id="i_r"><option value="">(대상 미지정)</option>${opt(recip,preR)}</select></div>
      </div>
      <div class="row">
        <div><div class="label">발생일</div><input id="i_date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
        <div><div class="label">담당자</div><input id="i_handler" value="${esc(S.user.name)}"></div>
      </div>
      <div class="label">문제 유형</div><div class="chips" id="i_problem">${PROBLEMS.map((p,i)=>`<span class="chip ${i===2?'on':''}" data-v="${p}" onclick="pick(this,'i_problem')">${p}</span>`).join('')}</div>
      <div class="label">심각도</div><div class="chips" id="i_sev">${SEVERITIES.map((s,i)=>`<span class="chip ${i===1?'on':''}" data-v="${s}" onclick="pick(this,'i_sev')">${s}</span>`).join('')}</div>
      <div class="hint">높음 = 센터장 확인 필요 · 긴급 = 배정변경·중단 검토</div>
      <div class="label">사건 내용</div><textarea id="i_content" placeholder="발생 상황을 서술하세요"></textarea>
      <div class="row">
        <div><div class="label">요청 조치</div><input id="i_req" placeholder="예: 보호자 상담"></div>
        <div><div class="label">다음 확인일</div><input id="i_next" type="date"></div>
      </div>
      <div style="height:14px"></div>
      <button class="btn block" onclick="saveIncident()">저장</button>
      <div class="hint">저장 시 위험가구 상태가 자동 갱신되고, ‘당일 취소’면 대체근무 요청이 생성됩니다.</div>
    </div>`);
}
function pick(el,group){const single=group==='i_sev';if(single){document.querySelectorAll('#'+group+' .chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');}else{el.classList.toggle('on');}}
function picked(group){return[...document.querySelectorAll('#'+group+' .chip.on')].map(c=>c.dataset.v);}
async function saveIncident(){
  const wid=$('i_w').value,rid=$('i_r').value||null;
  const probs=picked('i_problem'),sev=picked('i_sev')[0]||'보통';
  if(!probs.length){toast('문제 유형을 선택하세요',true);return;}
  load(true);
  const rows=probs.map(pt=>({careworker_id:wid,recipient_id:rid,occurred_on:$('i_date').value,problem_type:pt,severity:sev,content:$('i_content').value,requested_action:$('i_req').value,handler:$('i_handler').value,next_check_date:$('i_next').value||null,resolved:false}));
  const{error}=await db.from('care_incidents').insert(rows);
  if(error){load(false);toast('저장 오류: '+error.message,true);return;}
  // 위험가구 상태 자동 갱신
  if(rid){
    const{count}=await db.from('care_incidents').select('*',{count:'exact',head:true}).eq('recipient_id',rid);
    const newStatus=(count||0)>=3?'위험':'주의';
    await db.from('care_recipients').update({risk_status:newStatus,next_check_date:$('i_next').value||null}).eq('id',rid);
  }
  // 이탈위험 갱신 (고충 누적)
  const{count:wc}=await db.from('care_incidents').select('*',{count:'exact',head:true}).eq('careworker_id',wid).eq('resolved',false);
  if((wc||0)>=3)await db.from('care_careworkers').update({attrition_status:'위험'}).eq('id',wid);
  else if((wc||0)>=2)await db.from('care_careworkers').update({attrition_status:'주의'}).eq('id',wid);
  load(false);
  if(probs.includes('당일 취소')&&rid){
    const{data:sub}=await db.from('care_substitutes').insert({recipient_id:rid,cancel_reason:'당일 취소',affected_careworker_id:wid,gap_hours:4,status:'요청됨'}).select().maybeSingle();
    toast('저장됨 · 당일 취소 → 대체근무 요청 생성');
    go('subdetail',{id:sub?sub.id:''});return;
  }
  toast('저장됨 · 위험가구에 반영');
  if(rid)go('riskcard',{id:rid});else go('dash',{});
}

/* ---------- 4 RISK LIST ---------- */
async function viewRisk(){
  const[recip,workers]=await Promise.all([q('care_recipients',{order:'created_at'}),q('care_careworkers',{})]);
  const wmap=Object.fromEntries(workers.map(w=>[w.id,w.name]));
  const order={'위험':0,'조치중':1,'주의':2,'조치완료':3,'정상':4};
  recip.sort((a,b)=>(order[a.risk_status]??9)-(order[b.risk_status]??9));

async function saveScope(rid,status){

async function viewReport(){
  const[recip,inc,subs,workers,acts]=await Promise.all([
    q('care_recipients',{}),q('care_incidents',{}),q('care_substitutes',{}),q('care_careworkers',{}),q('care_actions',{})]);
  const riskCnt=recip.filter(r=>['주의','위험','조치중'].includes(r.risk_status)).length;

    </div>
    <div class="card" style="margin-top:14px"><div class="stat" style="cursor:default"><div class="k">이탈위험 요양보호사</div><div class="v">${atRisk} <small>명</small></div></div></div>

    <div class="card"><h3>이탈위험 요양보호사 상위 5</h3>${topWorker.length?topWorker.map(w=>`<div class="li" onclick="go('workercard',{id:'${w.id}'})"><div class="ln"><b>${esc(w.name)}</b><span>이탈위험 ${w.attrition_status}</span></div><span class="pill s-${w.attrition_status}">${w.attrition_status}</span></div>`).join(''):'<div class="empty">없음</div>'}</div>

      ${subs.map(s=>`<div class="li" style="cursor:default"><div class="ln"><b>대체근무 · ${esc(s.cancel_reason||'')}</b><span>${fdate(s.created_at)}</span></div><span class="pill s-${s.status}">${s.status}</span></div>`).join('')}
      ${acts.map(a=>`<div class="li" style="cursor:default"><div class="ln"><b>상담 · ${esc(a.action_type)}</b><span>${fdate(a.action_date)}</span></div></div>`).join('')}
      ${!subs.length&&!acts.length?'<div class="empty">이력 없음</div>':''}
    </div>
    <div class="btnrow">
      <button class="btn" onclick="go('action',{})">상담 기록</button>
      <button class="btn ghost" onclick="setWorker('${id}','관심')">이탈위험 완화(관심)</button>
    </div>`);
}
async function setWorker(id,status){load(true);await db.from('care_careworkers').update({attrition_status:status}).eq('id',id);load(false);toast('이탈위험: '+status);go('workercard',{id},false);}

/* ---------- 관리: 요양보호사 ---------- */
async function viewManageWorkers(){
  const workers=await q('care_careworkers',{order:'created_at'});
  return shell(hd('+','요양보호사 관리')+`
    <div class="card"><h3>새 요양보호사 추가</h3>
      <div class="row">
        <div><div class="label">이름</div><input id="nw_name" placeholder="이름"></div>
        <div><div class="label">나이</div><input id="nw_age" type="number" placeholder="나이"></div>
      </div>
      <div class="row">
        <div><div class="label">연락처</div><input id="nw_phone" placeholder="010-"></div>
        <div><div class="label">이탈위험 상태</div><select id="nw_status"><option>정상</option><option>관심</option><option>주의</option><option>위험</option></select></div>
      </div>
      <div style="height:12px"></div>
      <button class="btn block" onclick="addWorker()">+ 추가</button>
    </div>
    <div class="card"><h3>요양보호사 목록 (${workers.length}명)</h3>
      ${workers.length?workers.map(w=>`<div class="li" onclick="go('mworker_edit',{id:'${w.id}'})"><div class="av"></div><div class="ln"><b>${esc(w.name)} · ${w.age??'-'}세</b><span>${esc(w.phone||'연락처 없음')}</span></div><span class="pill s-${w.attrition_status}">${w.attrition_status}</span></div>`).join(''):'<div class="empty">등록된 요양보호사 없음</div>'}
    </div>`);
}
async function addWorker(){
  const name=$('nw_name').value.trim();
  if(!name){toast('이름을 입력하세요',true);return;}
  load(true);
  const{error}=await db.from('care_careworkers').insert({name,age:$('nw_age').value||null,phone:$('nw_phone').value,attrition_status:$('nw_status').value});
  load(false);
  if(error){toast('추가 오류: '+error.message,true);return;}
  toast('요양보호사 추가됨: '+name);go('mworker',{},false);
}
async function viewWorkerEdit(){
  const id=S.params.id;if(!id)return go('mworker',{},false);
  const arr=await q('care_careworkers',{eq:{id}});const w=arr[0];if(!w)return go('mworker',{},false);
  const so=s=>`<option ${w.attrition_status===s?'selected':''}>${s}</option>`;
  return shell(hd('+','요양보호사 수정')+`
    <div class="card">
      <div class="row">
        <div><div class="label">이름</div><input id="ew_name" value="${esc(w.name)}"></div>
        <div><div class="label">나이</div><input id="ew_age" type="number" value="${w.age??''}"></div>
      </div>
      <div class="row">
        <div><div class="label">연락처</div><input id="ew_phone" value="${esc(w.phone||'')}"></div>
        <div><div class="label">이탈위험 상태</div><select id="ew_status">${['정상','관심','주의','위험'].map(so).join('')}</select></div>
      </div>
      <div style="height:12px"></div>
      <button class="btn block" onclick="updateWorker('${id}')">저장</button>
      <button class="btn ghost block" style="margin-top:8px;color:#b91c1c;border-color:#fecaca" onclick="deleteWorker('${id}')">삭제</button>
    </div>`);
}
async function updateWorker(id){
  const name=$('ew_name').value.trim();if(!name){toast('이름을 입력하세요',true);return;}
  load(true);
  await db.from('care_careworkers').update({name,age:$('ew_age').value||null,phone:$('ew_phone').value,attrition_status:$('ew_status').value}).eq('id',id);
  load(false);toast('수정됨');go('mworker',{},false);
}
async function deleteWorker(id){
  if(!confirm('이 요양보호사를 삭제할까요? 담당 수급자·사건의 연결은 해제됩니다.'))return;
  load(true);await db.from('care_careworkers').delete().eq('id',id);load(false);
  toast('삭제됨');go('mworker',{},false);
}

/* ---------- 관리: 수급자 ---------- */
async function viewManageRecipients(){
  const[recip,workers]=await Promise.all([q('care_recipients',{order:'created_at'}),q('care_careworkers',{order:'name'})]);
  const wmap=Object.fromEntries(workers.map(w=>[w.id,w.name]));
  const opt=workers.map(w=>`<option value="${w.id}">${esc(w.name)}</option>`).join('');
  return shell(hd('+','수급자 관리')+`
    <div class="card"><h3>새 수급자 추가</h3>
      <div class="row">
        <div><div class="label">이름</div><input id="nr_name" placeholder="이름"></div>
        <div><div class="label">나이</div><input id="nr_age" type="number" placeholder="나이"></div>
      </div>
      <div class="row">
        <div><div class="label">담당 요양보호사</div><select id="nr_worker"><option value="">미지정</option>${opt}</select></div>
        <div><div class="label">위험 상태</div><select id="nr_status"><option>정상</option><option>주의</option><option>위험</option><option>조치중</option><option>조치완료</option></select></div>
      </div>
      <div class="row">
        <div><div class="label">보호자</div><input id="nr_gname" placeholder="보호자 이름"></div>
        <div><div class="label">관계</div><input id="nr_grel" placeholder="자녀/배우자 등"></div>
      </div>
      <div style="height:12px"></div>
      <button class="btn block" onclick="addRecipient()">+ 추가</button>
    </div>
    <div class="card"><h3>수급자 목록 (${recip.length}명)</h3>
      ${recip.length?recip.map(r=>`<div class="li" onclick="go('mrecipient_edit',{id:'${r.id}'})"><div class="av"></div><div class="ln"><b>${esc(r.name)} · ${r.age??'-'}세</b><span>담당 ${esc(wmap[r.careworker_id]||'미지정')}</span></div><span class="pill s-${r.risk_status}">${r.risk_status}</span></div>`).join(''):'<div class="empty">등록된 수급자 없음</div>'}
    </div>`);
}
async function addRecipient(){
  const name=$('nr_name').value.trim();
  if(!name){toast('이름을 입력하세요',true);return;}
  load(true);
  const{error}=await db.from('care_recipients').insert({name,age:$('nr_age').value||null,careworker_id:$('nr_worker').value||null,risk_status:$('nr_status').value,guardian_name:$('nr_gname').value,guardian_relation:$('nr_grel').value});
  load(false);
  if(error){toast('추가 오류: '+error.message,true);return;}
  toast('수급자 추가됨: '+name);go('mrecipient',{},false);
}
async function viewRecipientEdit(){
  const id=S.params.id;if(!id)return go('mrecipient',{},false);
  const[arr,workers]=await Promise.all([q('care_recipients',{eq:{id}}),q('care_careworkers',{order:'name'})]);
  const r=arr[0];if(!r)return go('mrecipient',{},false);
  const opt=workers.map(w=>`<option value="${w.id}" ${r.careworker_id===w.id?'selected':''}>${esc(w.name)}</option>`).join('');
  const so=s=>`<option ${r.risk_status===s?'selected':''}>${s}</option>`;
  return shell(hd('+','수급자 수정')+`
    <div class="card">
      <div class="row">
        <div><div class="label">이름</div><input id="er_name" value="${esc(r.name)}"></div>
        <div><div class="label">나이</div><input id="er_age" type="number" value="${r.age??''}"></div>
      </div>
      <div class="row">
        <div><div class="label">담당 요양보호사</div><select id="er_worker"><option value="">미지정</option>${opt}</select></div>
        <div><div class="label">위험 상태</div><select id="er_status">${['정상','주의','위험','조치중','조치완료'].map(so).join('')}</select></div>
      </div>
      <div class="row">
        <div><div class="label">보호자</div><input id="er_gname" value="${esc(r.guardian_name||'')}"></div>
        <div><div class="label">관계</div><input id="er_grel" value="${esc(r.guardian_relation||'')}"></div>
      </div>
      <div style="height:12px"></div>
      <button class="btn block" onclick="updateRecipient('${id}')">저장</button>
      <button class="btn ghost block" style="margin-top:8px;color:#b91c1c;border-color:#fecaca" onclick="deleteRecipient('${id}')">삭제</button>
    </div>`);
}
async function updateRecipient(id){
  const name=$('er_name').value.trim();if(!name){toast('이름을 입력하세요',true);return;}
  load(true);
  await db.from('care_recipients').update({name,age:$('er_age').value||null,careworker_id:$('er_worker').value||null,risk_status:$('er_status').value,guardian_name:$('er_gname').value,guardian_relation:$('er_grel').value}).eq('id',id);
  load(false);toast('수정됨');go('mrecipient',{},false);
}
async function deleteRecipient(id){
  if(!confirm('이 수급자를 삭제할까요? 관련 사건·조치의 연결은 해제됩니다.'))return;
  load(true);await db.from('care_recipients').delete().eq('id',id);load(false);
  toast('삭제됨');go('mrecipient',{},false);
}

/* ---------- ROUTER ---------- */
const VIEWS={dash:viewDash,incident:viewIncident,risk:viewRisk,riskcard:viewRiskCard,action:viewAction,sub:viewSub,subdetail:viewSubDetail,scope:viewScope,report:viewReport,worker:viewWorker,workercard:viewWorkerCard,mworker:viewManageWorkers,mworker_edit:viewWorkerEdit,mrecipient:viewManageRecipients,mrecipient_edit:viewRecipientEdit};
async function render(){
  if(!S.user){renderLogin();return;}
  const fn=VIEWS[S.route]||viewDash;
  load(true);
  try{const html=await fn();$('root').innerHTML=html;}
  catch(e){toast('오류: '+e.message,true);console.error(e);}
  load(false);
}
renderLogin();
</script>
